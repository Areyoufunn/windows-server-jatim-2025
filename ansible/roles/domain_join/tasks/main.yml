---
# ==============================================================
# Role: domain_join
# Join srv, fw, and workstation to itnsa.id domain
# ==============================================================

- name: Join host to itnsa.id domain
  microsoft.ad.membership:
    dns_domain_name: "{{ domain_name }}"
    domain_admin_user: "{{ domain_admin_user }}@{{ domain_name }}"
    domain_admin_password: "{{ domain_admin_password }}"
    state: domain
    hostname: "{{ inventory_hostname }}"
  register: domain_join_result

- name: Reboot after domain join
  ansible.windows.win_reboot:
    reboot_timeout: 600
    msg: "Rebooting after domain join"
  when: domain_join_result.reboot_required | default(false)
