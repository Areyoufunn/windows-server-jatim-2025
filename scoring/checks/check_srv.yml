---
# ==============================================================
# SCORING: Check SRV (srv.itnsa.id)
# Basic Config, RAID, File Service, IIS
# ALL tasks have ignore_errors to ensure scoring never stops
# ==============================================================

# ===== BASIC CONFIG =====
- name: "BC03 - Check SRV hostname"
  ansible.windows.win_shell: "(hostname).ToLower()"
  register: srv_hostname
  ignore_errors: yes

- name: "BC03 - Score"
  set_fact:
    score_BC03: "{{ 1 if (srv_hostname.stdout | default('') | trim | lower) == 'srv' else 0 }}"
  ignore_errors: yes

- name: "BC04 - Check SRV IP"
  ansible.windows.win_shell: |
    (Get-NetIPAddress -InterfaceAlias "Ethernet0","Ethernet 0" -AddressFamily IPv4 -ErrorAction SilentlyContinue | Select-Object -First 1).IPAddress
  register: srv_ip
  ignore_errors: yes

- name: "BC04 - Score"
  set_fact:
    score_BC04: "{{ 1 if (srv_ip.stdout | default('') | trim) == '172.16.0.10' else 0 }}"
  ignore_errors: yes

# ===== RAID =====
- name: "RAID01-04 - Check RAID and R: drive"
  ansible.windows.win_shell: |
    $disks = @(Get-PhysicalDisk | Where-Object { $_.Size -gt 9GB -and $_.Size -lt 11GB }).Count
    $pool = @(Get-StoragePool | Where-Object { $_.FriendlyName -ne 'Primordial' }).Count
    $rDrive = Test-Path R:
    $fs = if($rDrive) { (Get-Volume -DriveLetter R -ErrorAction SilentlyContinue).FileSystemType } else { 'NONE' }
    Write-Output "disks=$disks,pool=$pool,r_exists=$rDrive,filesystem=$fs"
  register: raid_check
  ignore_errors: yes
  tags: raid

- name: "RAID - Score disks"
  set_fact:
    score_RAID01: "{{ 1 if 'disks=3' in (raid_check.stdout | default('')) or 'disks=4' in (raid_check.stdout | default('')) else 0 }}"
  ignore_errors: yes
  tags: raid

- name: "RAID - Score pool"
  set_fact:
    score_RAID02: "{{ 2 if 'pool=1' in (raid_check.stdout | default('')) or 'pool=2' in (raid_check.stdout | default('')) else 0 }}"
  ignore_errors: yes
  tags: raid

- name: "RAID - Score NTFS"
  set_fact:
    score_RAID03: "{{ 1 if 'filesystem=NTFS' in (raid_check.stdout | default('')) else 0 }}"
  ignore_errors: yes
  tags: raid

- name: "RAID - Score R drive"
  set_fact:
    score_RAID04: "{{ 1 if 'r_exists=True' in (raid_check.stdout | default('')) else 0 }}"
    detail_RAID: "{{ raid_check.stdout | default('SKIPPED') | trim }}"
  ignore_errors: yes
  tags: raid

# ===== FILE SERVICE =====
- name: "FS01-04 - Check shares exist"
  ansible.windows.win_shell: |
    $shares = @('Direksi','Manager','Karyawan','Home')
    $results = @()
    foreach ($s in $shares) {
        $share = Get-SmbShare -Name $s -ErrorAction SilentlyContinue
        $path = if($share) { $share.Path } else { 'N/A' }
        $results += "$s=$(if($share){'EXISTS'}else{'MISSING'})|path=$path"
    }
    $results -join ','
  register: fs_shares
  ignore_errors: yes

- name: "FS01-04 - Score shares"
  set_fact:
    score_FS01: "{{ 1 if 'Direksi=EXISTS' in (fs_shares.stdout | default('')) else 0 }}"
    score_FS02: "{{ 1 if 'Manager=EXISTS' in (fs_shares.stdout | default('')) else 0 }}"
    score_FS03: "{{ 1 if 'Karyawan=EXISTS' in (fs_shares.stdout | default('')) else 0 }}"
    score_FS04: "{{ 1 if 'Home=EXISTS' in (fs_shares.stdout | default('')) else 0 }}"
    detail_FS_shares: "{{ fs_shares.stdout | default('NOT CONFIGURED') | trim }}"
  ignore_errors: yes

- name: "FS05-08 - Check share permissions"
  ansible.windows.win_shell: |
    $results = @()
    $checks = @{
        'Direksi' = 'ITNSA\\Direksi'
        'Manager' = 'ITNSA\\Manager'
        'Karyawan' = 'ITNSA\\Karyawan'
        'Home' = 'ITNSA\\Domain Users'
    }
    foreach ($s in $checks.Keys) {
        $perms = Get-SmbShareAccess -Name $s -ErrorAction SilentlyContinue
        $hasAccess = $perms | Where-Object { $_.AccountName -match $checks[$s].Replace('ITNSA\\','') }
        $results += "${s}_perm=$(if($hasAccess){'PASS'}else{'FAIL'})"
    }
    $results -join ','
  register: fs_perms
  ignore_errors: yes

- name: "FS05-08 - Score permissions"
  set_fact:
    score_FS05: "{{ 1 if 'Direksi_perm=PASS' in (fs_perms.stdout | default('')) else 0 }}"
    score_FS06: "{{ 1 if 'Manager_perm=PASS' in (fs_perms.stdout | default('')) else 0 }}"
    score_FS07: "{{ 1 if 'Karyawan_perm=PASS' in (fs_perms.stdout | default('')) else 0 }}"
    score_FS08: "{{ 1 if 'Home_perm=PASS' in (fs_perms.stdout | default('')) else 0 }}"
  ignore_errors: yes

- name: "FS09-10 - Check quotas"
  ansible.windows.win_shell: |
    $results = @()
    $paths = @{
        'Direksi' = 'R:\Shares\Direksi'
        'Manager' = 'R:\Shares\Manager'
        'Karyawan' = 'R:\Shares\Karyawan'
        'Home' = 'R:\Shares\Home'
    }
    foreach ($name in $paths.Keys) {
        $q = Get-FsrmQuota -Path $paths[$name] -ErrorAction SilentlyContinue
        $sizeMB = if($q) { [math]::Round($q.Size / 1MB) } else { 0 }
        $results += "${name}_quota=${sizeMB}MB"
    }
    $results -join ','
  register: fs_quotas
  ignore_errors: yes

- name: "FS09-10 - Score quotas"
  set_fact:
    score_FS09: "{{ 2 if 'Direksi_quota=100MB' in (fs_quotas.stdout | default('')) and 'Manager_quota=100MB' in (fs_quotas.stdout | default('')) and 'Karyawan_quota=100MB' in (fs_quotas.stdout | default('')) else 0 }}"
    score_FS10: "{{ 1 if 'Home_quota=50MB' in (fs_quotas.stdout | default('')) else 0 }}"
    detail_FS_quotas: "{{ fs_quotas.stdout | default('NOT CONFIGURED') | trim }}"
  ignore_errors: yes

- name: "FS11 - Check file screen"
  ansible.windows.win_shell: |
    $screens = Get-FsrmFileScreen -ErrorAction SilentlyContinue
    $groups = Get-FsrmFileGroup -ErrorAction SilentlyContinue
    $blocksBat = $groups | Where-Object { $_.IncludePattern -contains '*.bat' }
    $blocksPs1 = $groups | Where-Object { $_.IncludePattern -contains '*.ps1' }
    $screenCount = @($screens | Where-Object { $_.Path -like 'R:\Shares\*' }).Count
    Write-Output "screens=$screenCount,bat=$([bool]$blocksBat),ps1=$([bool]$blocksPs1)"
  register: fs_screen
  ignore_errors: yes

- name: "FS11 - Score file screen"
  set_fact:
    score_FS11: "{{ 2 if 'bat=True' in (fs_screen.stdout | default('')) and 'ps1=True' in (fs_screen.stdout | default('')) else 0 }}"
    detail_FS_screen: "{{ fs_screen.stdout | default('NOT CONFIGURED') | trim }}"
  ignore_errors: yes

# ===== IIS WEB SERVICE =====
- name: "IIS01 - Check IIS installed"
  ansible.windows.win_shell: "(Get-WindowsFeature Web-Server).Installed"
  register: iis_installed
  ignore_errors: yes

- name: "IIS01 - Score"
  set_fact:
    score_IIS01: "{{ 1 if (iis_installed.stdout | default('') | trim) == 'True' else 0 }}"
  ignore_errors: yes

- name: "IIS02-07 - Check websites"
  ansible.windows.win_shell: |
    Import-Module WebAdministration -ErrorAction SilentlyContinue
    $results = @()
    # www.itnsa.id
    $www = Get-Website -Name "www.itnsa.id" -ErrorAction SilentlyContinue
    $results += "www_exists=$([bool]$www)"
    if ($www) {
        $content = Get-Content "$($www.PhysicalPath)\index.html" -ErrorAction SilentlyContinue
        $results += "www_content=$(if($content -match 'Welcome to www.itnsa.id'){'PASS'}else{'FAIL'})"
        $sslBinding = Get-WebBinding -Name "www.itnsa.id" -Protocol https -ErrorAction SilentlyContinue
        $results += "www_ssl=$([bool]$sslBinding)"
    }
    # private.itnsa.id
    $priv = Get-Website -Name "private.itnsa.id" -ErrorAction SilentlyContinue
    $results += "priv_exists=$([bool]$priv)"
    if ($priv) {
        $content = Get-Content "$($priv.PhysicalPath)\index.html" -ErrorAction SilentlyContinue
        $results += "priv_content=$(if($content -match 'Private site of itnsa.id'){'PASS'}else{'FAIL'})"
        $sslBinding = Get-WebBinding -Name "private.itnsa.id" -Protocol https -ErrorAction SilentlyContinue
        $results += "priv_ssl=$([bool]$sslBinding)"
        # Check auth restriction
        $winAuth = Get-WebConfigurationProperty -Filter "/system.webServer/security/authentication/windowsAuthentication" -PSPath "IIS:\" -Location "private.itnsa.id" -Name "enabled" -ErrorAction SilentlyContinue
        $anonAuth = Get-WebConfigurationProperty -Filter "/system.webServer/security/authentication/anonymousAuthentication" -PSPath "IIS:\" -Location "private.itnsa.id" -Name "enabled" -ErrorAction SilentlyContinue
        $results += "priv_winauth=$($winAuth.Value),priv_anon=$($anonAuth.Value)"
    }
    $results -join ','
  register: iis_sites
  ignore_errors: yes

- name: "IIS02-08 - Score IIS"
  set_fact:
    score_IIS02: "{{ 1 if 'www_exists=True' in (iis_sites.stdout | default('')) else 0 }}"
    score_IIS03: "{{ 1 if 'www_content=PASS' in (iis_sites.stdout | default('')) else 0 }}"
    score_IIS04: "{{ 2 if 'www_ssl=True' in (iis_sites.stdout | default('')) else 0 }}"
    score_IIS05: "{{ 1 if 'priv_exists=True' in (iis_sites.stdout | default('')) else 0 }}"
    score_IIS06: "{{ 1 if 'priv_content=PASS' in (iis_sites.stdout | default('')) else 0 }}"
    score_IIS07: "{{ 2 if 'priv_ssl=True' in (iis_sites.stdout | default('')) else 0 }}"
    score_IIS08: "{{ 1 if 'priv_winauth=True' in (iis_sites.stdout | default('')) and 'priv_anon=False' in (iis_sites.stdout | default('')) else 0 }}"
    detail_IIS: "{{ iis_sites.stdout | default('NOT CONFIGURED') | trim }}"
  ignore_errors: yes
