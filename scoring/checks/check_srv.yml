---
# ==============================================================
# SCORING: Check SRV (srv.itnsa.id)
# Basic Config, RAID, File Service, IIS
# ALL tasks have ignore_errors to ensure scoring never stops
# ==============================================================

# ===== BASIC CONFIG =====
- name: "BC03 - Check SRV hostname"
  ansible.windows.win_shell: "(hostname).ToLower()"
  register: srv_hostname
  ignore_errors: yes

- name: "BC03 - Score"
  set_fact:
    score_BC03: "{{ 1 if (srv_hostname.stdout | default('') | trim | lower) == 'srv' else 0 }}"
  ignore_errors: yes

- name: "BC04 - Check SRV IP"
  ansible.windows.win_shell: |
    $ip = Get-NetIPAddress -InterfaceAlias "Ethernet0","Ethernet 0" -AddressFamily IPv4 -ErrorAction SilentlyContinue | Select-Object -First 1
    Write-Output $ip.IPAddress
  register: srv_ip
  ignore_errors: yes

- name: "BC04 - Score"
  set_fact:
    score_BC04: "{{ 1 if (srv_ip.stdout | default('') | trim) == '172.16.0.10' else 0 }}"
  ignore_errors: yes

# ===== RAID =====
- name: "RAID01-04 - Check RAID and R: drive"
  ansible.windows.win_shell: |
    $dc = @(Get-PhysicalDisk).Count
    $sp = @(Get-StoragePool -IsPrimordial 0 -ErrorAction SilentlyContinue).Count
    $rd = Test-Path R:
    $ft = 'NONE'
    if ($rd) { $ft = (Get-Volume -DriveLetter R -ErrorAction SilentlyContinue).FileSystemType }
    Write-Output "disks=$dc,pool=$sp,r_exists=$rd,filesystem=$ft"
  register: raid_check
  ignore_errors: yes
  tags: raid

- name: "RAID - Score disks"
  set_fact:
    score_RAID01: "{{ 1 if 'disks=3' in (raid_check.stdout | default('')) or 'disks=4' in (raid_check.stdout | default('')) or 'disks=5' in (raid_check.stdout | default('')) else 0 }}"
  ignore_errors: yes
  tags: raid

- name: "RAID - Score pool"
  set_fact:
    score_RAID02: "{{ 2 if 'pool=1' in (raid_check.stdout | default('')) else 0 }}"
  ignore_errors: yes
  tags: raid

- name: "RAID - Score NTFS"
  set_fact:
    score_RAID03: "{{ 1 if 'filesystem=NTFS' in (raid_check.stdout | default('')) else 0 }}"
  ignore_errors: yes
  tags: raid

- name: "RAID - Score R drive"
  set_fact:
    score_RAID04: "{{ 1 if 'r_exists=True' in (raid_check.stdout | default('')) else 0 }}"
    detail_RAID: "{{ raid_check.stdout | default('SKIPPED') | trim }}"
  ignore_errors: yes
  tags: raid

# ===== FILE SERVICE =====
- name: "FS01-04 - Check shares exist"
  ansible.windows.win_shell: |
    $out = ''
    foreach ($n in @('Direksi','Manager','Karyawan','Home')) {
        $s = Get-SmbShare -Name $n -ErrorAction SilentlyContinue
        if ($s) { $out += "$n=EXISTS," } else { $out += "$n=MISSING," }
    }
    Write-Output $out
  register: fs_shares
  ignore_errors: yes

- name: "FS01-04 - Score shares"
  set_fact:
    score_FS01: "{{ 1 if 'Direksi=EXISTS' in (fs_shares.stdout | default('')) else 0 }}"
    score_FS02: "{{ 1 if 'Manager=EXISTS' in (fs_shares.stdout | default('')) else 0 }}"
    score_FS03: "{{ 1 if 'Karyawan=EXISTS' in (fs_shares.stdout | default('')) else 0 }}"
    score_FS04: "{{ 1 if 'Home=EXISTS' in (fs_shares.stdout | default('')) else 0 }}"
    detail_FS_shares: "{{ fs_shares.stdout | default('NOT CONFIGURED') | trim }}"
  ignore_errors: yes

- name: "FS05-08 - Check share permissions"
  ansible.windows.win_shell: |
    $out = ''
    $names = @('Direksi','Manager','Karyawan','Home')
    $groups = @('Direksi','Manager','Karyawan','Domain Users')
    for ($i = 0; $i -lt $names.Count; $i++) {
        $perms = Get-SmbShareAccess -Name $names[$i] -ErrorAction SilentlyContinue
        $ok = $perms | Where-Object { $_.AccountName -match $groups[$i] }
        if ($ok) { $out += $names[$i] + '_perm=PASS,' } else { $out += $names[$i] + '_perm=FAIL,' }
    }
    Write-Output $out
  register: fs_perms
  ignore_errors: yes

- name: "FS05-08 - Score permissions"
  set_fact:
    score_FS05: "{{ 1 if 'Direksi_perm=PASS' in (fs_perms.stdout | default('')) else 0 }}"
    score_FS06: "{{ 1 if 'Manager_perm=PASS' in (fs_perms.stdout | default('')) else 0 }}"
    score_FS07: "{{ 1 if 'Karyawan_perm=PASS' in (fs_perms.stdout | default('')) else 0 }}"
    score_FS08: "{{ 1 if 'Home_perm=PASS' in (fs_perms.stdout | default('')) else 0 }}"
  ignore_errors: yes

- name: "FS09-10 - Check quotas"
  ansible.windows.win_shell: |
    $out = ''
    $names = @('Direksi','Manager','Karyawan','Home')
    foreach ($n in $names) {
        $p = Join-Path 'R:\Shares' $n
        $q = Get-FsrmQuota -Path $p -ErrorAction SilentlyContinue
        $mb = 0
        if ($q) { $mb = [math]::Round($q.Size / 1MB) }
        $out += $n + '_quota=' + $mb + 'MB,'
    }
    Write-Output $out
  register: fs_quotas
  ignore_errors: yes

- name: "FS09-10 - Score quotas"
  set_fact:
    score_FS09: "{{ 2 if 'Direksi_quota=100MB' in (fs_quotas.stdout | default('')) and 'Manager_quota=100MB' in (fs_quotas.stdout | default('')) and 'Karyawan_quota=100MB' in (fs_quotas.stdout | default('')) else 0 }}"
    score_FS10: "{{ 1 if 'Home_quota=50MB' in (fs_quotas.stdout | default('')) else 0 }}"
    detail_FS_quotas: "{{ fs_quotas.stdout | default('NOT CONFIGURED') | trim }}"
  ignore_errors: yes

- name: "FS11 - Check file screen"
  ansible.windows.win_shell: |
    $groups = Get-FsrmFileGroup -ErrorAction SilentlyContinue
    $bat = $false
    $ps1 = $false
    if ($groups) {
        $bat = ($groups | Where-Object { $_.IncludePattern -contains '*.bat' }) -ne $null
        $ps1 = ($groups | Where-Object { $_.IncludePattern -contains '*.ps1' }) -ne $null
    }
    Write-Output "bat=$bat,ps1=$ps1"
  register: fs_screen
  ignore_errors: yes

- name: "FS11 - Score file screen"
  set_fact:
    score_FS11: "{{ 2 if 'bat=True' in (fs_screen.stdout | default('')) and 'ps1=True' in (fs_screen.stdout | default('')) else 0 }}"
    detail_FS_screen: "{{ fs_screen.stdout | default('NOT CONFIGURED') | trim }}"
  ignore_errors: yes

# ===== IIS WEB SERVICE =====
- name: "IIS01 - Check IIS installed"
  ansible.windows.win_shell: "(Get-WindowsFeature Web-Server).Installed"
  register: iis_installed
  ignore_errors: yes

- name: "IIS01 - Score"
  set_fact:
    score_IIS01: "{{ 1 if (iis_installed.stdout | default('') | trim) == 'True' else 0 }}"
  ignore_errors: yes

- name: "IIS02-07 - Check websites"
  ansible.windows.win_shell: |
    Import-Module WebAdministration -ErrorAction SilentlyContinue
    $out = ''
    $www = Get-Website -Name "www.itnsa.id" -ErrorAction SilentlyContinue
    if ($www) { $out += 'www_exists=True,' } else { $out += 'www_exists=False,' }
    if ($www) {
        $p = Join-Path $www.PhysicalPath 'index.html'
        $c = Get-Content $p -ErrorAction SilentlyContinue
        if ($c -match 'Welcome to www.itnsa.id') { $out += 'www_content=PASS,' } else { $out += 'www_content=FAIL,' }
        $ssl = Get-WebBinding -Name "www.itnsa.id" -Protocol https -ErrorAction SilentlyContinue
        if ($ssl) { $out += 'www_ssl=True,' } else { $out += 'www_ssl=False,' }
    }
    $priv = Get-Website -Name "private.itnsa.id" -ErrorAction SilentlyContinue
    if ($priv) { $out += 'priv_exists=True,' } else { $out += 'priv_exists=False,' }
    if ($priv) {
        $p = Join-Path $priv.PhysicalPath 'index.html'
        $c = Get-Content $p -ErrorAction SilentlyContinue
        if ($c -match 'Private site of itnsa.id') { $out += 'priv_content=PASS,' } else { $out += 'priv_content=FAIL,' }
        $ssl = Get-WebBinding -Name "private.itnsa.id" -Protocol https -ErrorAction SilentlyContinue
        if ($ssl) { $out += 'priv_ssl=True,' } else { $out += 'priv_ssl=False,' }
        $winauth = & $env:SystemRoot\system32\inetsrv\appcmd.exe list config "private.itnsa.id" /section:windowsAuthentication /text:enabled 2>$null
        $anonauth = & $env:SystemRoot\system32\inetsrv\appcmd.exe list config "private.itnsa.id" /section:anonymousAuthentication /text:enabled 2>$null
        $out += "priv_winauth=$winauth,priv_anon=$anonauth"
    }
    Write-Output $out
  register: iis_sites
  ignore_errors: yes

- name: "IIS02-08 - Score IIS"
  set_fact:
    score_IIS02: "{{ 1 if 'www_exists=True' in (iis_sites.stdout | default('')) else 0 }}"
    score_IIS03: "{{ 1 if 'www_content=PASS' in (iis_sites.stdout | default('')) else 0 }}"
    score_IIS04: "{{ 2 if 'www_ssl=True' in (iis_sites.stdout | default('')) else 0 }}"
    score_IIS05: "{{ 1 if 'priv_exists=True' in (iis_sites.stdout | default('')) else 0 }}"
    score_IIS06: "{{ 1 if 'priv_content=PASS' in (iis_sites.stdout | default('')) else 0 }}"
    score_IIS07: "{{ 2 if 'priv_ssl=True' in (iis_sites.stdout | default('')) else 0 }}"
    score_IIS08: "{{ 1 if 'priv_winauth=True' in (iis_sites.stdout | default('')) and 'priv_anon=False' in (iis_sites.stdout | default('')) else 0 }}"
    detail_IIS: "{{ iis_sites.stdout | default('NOT CONFIGURED') | trim }}"
  ignore_errors: yes
